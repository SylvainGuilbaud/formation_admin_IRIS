global:
  scrape_interval: 15s
rule_files:
  - "./isc_alert_rules.yml"
scrape_configs:
  - job_name: 'iris-training'
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: 
        - 'host.docker.internal:10000'
    scheme: http
  - job_name: 'interop_metrics-training'
    metrics_path: /api/monitor/interop/interfaces
    static_configs:
      - targets:
          - 'host.docker.internal:10000'
    scheme: http
  - job_name: 'iris-prod-1'
    metrics_path: /iris-prod-1/api/monitor/metrics
    static_configs:
      - targets: 
        - 'host.docker.internal:18880'
    scheme: http
  - job_name: 'interop_metrics-prod-1'
    metrics_path: /iris-prod-1/api/monitor/interop/interfaces
    static_configs:
      - targets:
          - 'host.docker.internal:18880'
    scheme: http
  - job_name: 'iris-prod-2'
    metrics_path: /iris-prod-2/api/monitor/metrics
    static_configs:
      - targets: 
        - 'host.docker.internal:18880'
    scheme: http
  - job_name: 'interop_metrics-prod-2'
    metrics_path: /iris-prod-2/api/monitor/interop/interfaces
    static_configs:
      - targets:
          - 'host.docker.internal:18880'
    scheme: http
  - job_name: 'iris-htap'
    metrics_path: /api/monitor/metrics
    static_configs:
      - targets: 
        - 'host.docker.internal:20080'
  - job_name: 'application'
    metrics_path: /monitor/metrics
    static_configs:
      - targets: 
        - 'host.docker.internal:10000'
